<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Inventek" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Inventek</title>
    <script>
      // Pre-apply theme to avoid flash. Mirrors logic in src/state/theme.ts.
      try {
        var t = localStorage.getItem('inventek.theme') || 'system';
        var dark =
          t === 'dark' ||
          (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      Inventek necesita JavaScript activado para funcionar.
    </noscript>
  </body>
</html>
